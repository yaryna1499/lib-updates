name: Run TG Bot Cron

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Restore state cache
        uses: actions/cache@v6
        id: state-cache
        with:
          path: state.json
          key: release-state-v1

      - name: Seed state from template on cache miss
        if: steps.state-cache.outputs.cache-hit != 'true'
        run: cp state.template.json state.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Run Script
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MODEL: ${{ secrets.MODEL }}
        run: uv run python main.py